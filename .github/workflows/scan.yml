name: SEC Insider Scanner

on:
  schedule:
    # FUSO ITALIANO (CEST = UTC+2):
    # 15:30-22:00 IT = mercato US aperto = 13:30-20:00 UTC
    # 22:00-00:00 IT = post-close US     = 20:00-22:00 UTC
    # 00:00-15:30 IT = night block       = 22:00-13:30 UTC
    
    # MERCATO US APERTO — cron ogni 2 min (lag medio ~1 min)
    - cron: '*/2 13-19 * * 1-5'
    
    # POST-CLOSE US — cron ogni 5 min (filing batch serali)
    - cron: '*/5 20-21 * * 1-5'
    
    # NIGHT BLOCK — cron ogni 30 min (poco traffico)
    - cron: '*/30 22-23 * * 1-5'
    - cron: '*/30 0-13 * * 1-5'
    
    # WEEKEND — cron ogni ora (filing rari)
    - cron: '0 * * * 0,6'
  
  workflow_dispatch:  # esecuzione manuale dalla UI GitHub

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run fetcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SOGLIA_USD: '10000'
        run: python fetcher.py
      
      - name: Commit and push data.json
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 update data.json [skip ci]"
            git push
          fi
