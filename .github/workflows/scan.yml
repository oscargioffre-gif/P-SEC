name: SEC Insider Scanner

on:
  schedule:
    - cron: '*/2 13-19 * * 1-5'
    - cron: '*/5 20-21 * * 1-5'
    - cron: '*/30 22-23 * * 1-5'
    - cron: '*/30 0-13 * * 1-5'
    - cron: '0 * * * 0,6'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scan-workflow
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run fetcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SOGLIA_USD: '10000'
        run: python fetcher.py
      
      - name: Commit and push data.json
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          if git diff --quiet data.json; then
            echo "No changes to data.json, skip"
            exit 0
          fi
          
          git stash push data.json -m "fetcher-data"
          git pull --rebase origin main
          git stash pop || echo "stash pop note"
          
          for attempt in 1 2 3; do
            git add data.json
            if git diff --staged --quiet; then
              echo "No effective changes after rebase"
              exit 0
            fi
            git commit -m "update data.json [skip ci]"
            
            if git push origin main; then
              echo "Push successful on attempt $attempt"
              exit 0
            else
              echo "Push failed attempt $attempt, retrying..."
              git reset HEAD~1
              git stash push data.json -m "fetcher-retry-$attempt" || true
              git pull --rebase origin main
              git stash pop || true
              sleep 2
            fi
          done
          
          echo "Push failed after 3 attempts"
          exit 1
